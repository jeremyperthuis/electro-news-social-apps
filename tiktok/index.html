<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Legal – TikTok Analytics App</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #f7f5f0;
      --ink: #1a1916;
      --muted: #6b6860;
      --rule: #e0ddd8;
      --surface: #ffffff;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--ink);
      font-family: 'DM Sans', sans-serif;
      font-weight: 300;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    .wrapper {
      max-width: 480px;
      width: 100%;
      text-align: center;
    }

    .eyebrow {
      font-size: 0.65rem;
      font-weight: 500;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 1rem;
    }

    h1 {
      font-family: 'DM Serif Display', serif;
      font-size: clamp(1.8rem, 5vw, 2.6rem);
      font-weight: 400;
      line-height: 1.2;
      margin-bottom: 0.8rem;
    }

    .subtitle {
      font-size: 0.9rem;
      color: var(--muted);
      margin-bottom: 3rem;
      line-height: 1.6;
    }

    .links {
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    .link-card {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: var(--surface);
      border: 1px solid var(--rule);
      padding: 1.4rem 1.8rem;
      text-decoration: none;
      color: var(--ink);
      transition: border-color 0.2s, transform 0.2s;
    }

    .link-card:hover {
      border-color: var(--ink);
      transform: translateY(-2px);
    }

    .link-card-left {
      text-align: left;
    }

    .link-card-label {
      font-size: 0.65rem;
      font-weight: 500;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 0.3rem;
    }

    .link-card-title {
      font-family: 'DM Serif Display', serif;
      font-size: 1.15rem;
      font-weight: 400;
    }

    .arrow {
      font-size: 1.2rem;
      color: var(--muted);
      transition: color 0.2s, transform 0.2s;
    }

    .link-card:hover .arrow {
      color: var(--ink);
      transform: translateX(4px);
    }

    footer {
      margin-top: 3rem;
      font-size: 0.72rem;
      color: var(--muted);
      letter-spacing: 0.05em;
    }
  </style>
</head>
<body>

  <div class="wrapper">
    <p class="eyebrow">electro-news-insights</p>
    <h1>Legal Documents</h1>
    <p class="subtitle">Internal analytics tool for TikTok video performance metrics.</p>

    <div class="links">
      <a class="link-card" href="tiktok-terms-of-service.html">
        <div class="link-card-left">
          <p class="link-card-label">Document 01</p>
          <p class="link-card-title">Terms of Service</p>
        </div>
        <span class="arrow">→</span>
      </a>

      <a class="link-card" href="tiktok-privacy-policy.html">
        <div class="link-card-left">
          <p class="link-card-label">Document 02</p>
          <p class="link-card-title">Privacy Policy</p>
        </div>
        <span class="arrow">→</span>
      </a>
    </div>

    <footer>© 2026 · Electro-News · All rights reserved</footer>
  </div>

</body>
</html>
